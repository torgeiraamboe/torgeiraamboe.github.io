taxonomies:
    category: categories
    tag: tags
    series: series

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - '\['
            - '\]'
          - - $$
            - $$
          inline:
          - - '\('
            - '\)'
          - - '$'
            - '$'
        enable: true
  

privacy:
    vimeo:
        disabled: false
        simple: true

    x:
        disabled: false
        enableDNT: false
        simple: true

    instagram:
        disabled: false
        simple: true

    youtube:
        disabled: false
        privacyEnhanced: true

services:
    instagram:
        disableInlineCSS: true
    x:
        disableInlineCSS: true

    