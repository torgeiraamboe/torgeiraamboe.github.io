baseURL: "https://torgeiraamboe.github.io/"
title: Torgeir Aambø
paginate: 10
theme: PaperMod
copyright: " "
publishDir: docs

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

# googleAnalytics: UA-123-45

minify:
    disableXML: true
    # minifyOutput: true



    
outputs:
    home:
        - HTML
        - RSS
        - JSON

menu:
    main:
      - name: Research
        url: research/
        weight: 5
      - name: Blog
        url: posts/
        weight: 6  
      - name: Outreach
        url: "outreach/"
        weight: 10
      - name: Reading
        url: have-read/
        weight: 15      
      - name: About
        url: about/
        weight: 30



